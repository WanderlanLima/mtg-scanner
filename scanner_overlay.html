<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error-container": "#ffdad6",
                        "secondary": "#46eae5",
                        "secondary-fixed-dim": "#2edcd7",
                        "tertiary-fixed-dim": "#ffb77d",
                        "tertiary-fixed": "#ffdcc3",
                        "on-error": "#690005",
                        "on-secondary-container": "#005250",
                        "surface-container": "#1f1f22",
                        "surface-container-lowest": "#0e0e11",
                        "outline-variant": "#474554",
                        "primary-fixed-dim": "#c6bfff",
                        "secondary-fixed": "#5af9f3",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "surface-dim": "#131316",
                        "on-surface": "#e4e1e6",
                        "error": "#ffb4ab",
                        "surface-bright": "#39393c",
                        "on-tertiary": "#4d2600",
                        "inverse-surface": "#e4e1e6",
                        "on-surface-variant": "#c8c4d7",
                        "on-secondary": "#003735",
                        "secondary-container": "#00cec9",
                        "on-tertiary-container": "#fff5f1",
                        "on-background": "#e4e1e6",
                        "surface-container-low": "#1b1b1e",
                        "surface-container-highest": "#353438",
                        "background": "#131316",
                        "surface": "#131316",
                        "on-tertiary-fixed": "#2f1500",
                        "tertiary-container": "#ac5d00",
                        "on-primary-fixed-variant": "#4029ba",
                        "inverse-primary": "#5847d2",
                        "error-container": "#93000a",
                        "on-secondary-fixed": "#00201f",
                        "primary-container": "#6c5ce7",
                        "on-secondary-fixed-variant": "#00504e",
                        "on-primary-container": "#faf6ff",
                        "primary-fixed": "#e4dfff",
                        "on-primary-fixed": "#160066",
                        "surface-variant": "#353438",
                        "surface-tint": "#c6bfff",
                        "outline": "#928ea0",
                        "surface-container-high": "#2a2a2d",
                        "tertiary": "#ffb77d",
                        "inverse-on-surface": "#303033",
                        "primary": "#c6bfff",
                        "on-primary": "#2900a0"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .scanner-mask {
            mask: radial-gradient(circle, transparent 0%, transparent 100%) content-box,
                  linear-gradient(#000 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
        }
        
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        .scan-line {
            animation: scan 3s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Camera Preview Background -->
<div class="fixed inset-0 z-0">
<img alt="Close-up of a trading card under studio lighting" class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]" data-alt="Close-up of a trading card under studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxs3S8rRl9MjvPi7qOMS8ELzXc9BpS418po5UKvxp8ASSHzbRvdjQFqYL1WA191ZiC2vEr_-YqrCm993wx5jw-64TWY85FjLF2QcmqppWHt-A5nWry3eBPi0HuIijJTMD49Y1k8Xu5M3WAbhyJ65PH2_1fmUkRmyh5vQubugrVwO2UToR1TDs93zCgI8UILvVFFlE-DiyNZXr7-OisDPGOUk3ytDGcHjnGaMYGzabfs9Ya19fiHIAufoiHnXm5giUf5X8R78penp1G"/>
</div>
<!-- Interface Shell -->
<div class="relative z-10 min-h-screen flex flex-col">
<!-- TopAppBar Predicted Component -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-[#131316] dark:bg-[#131316] border-b border-[#474554]/15 sticky top-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#6c5ce7]" data-icon="auto_awesome">auto_awesome</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl font-black text-[#6c5ce7] uppercase tracking-widest">The Ethereal Archive</h1>
</div>
<div class="flex gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#1b1b1e] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#474554]" data-icon="bolt">bolt</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#1b1b1e] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#474554]" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Scanner Canvas -->
<main class="flex-grow relative flex flex-col items-center justify-center">
<!-- Darkened Overlay with cutout (CSS Mask Simulation) -->
<div class="absolute inset-0 bg-surface-container-lowest/80 backdrop-blur-[2px]"></div>
<!-- Scanning Reticle Area -->
<div class="relative w-72 h-44 sm:w-96 sm:h-60 z-20">
<!-- Inner Focus Frame -->
<div class="absolute inset-0 border-2 border-secondary/30 rounded-xl overflow-hidden shadow-[0_0_50px_rgba(0,206,201,0.2)]">
<!-- The "Transparent" Cutout Visual -->
<div class="absolute inset-0 bg-transparent"></div>
<!-- Animated Scan Line -->
<div class="scan-line absolute left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-secondary to-transparent shadow-[0_0_15px_#46eae5] z-30"></div>
</div>
<!-- Corner Brackets -->
<div class="absolute -top-2 -left-2 w-8 h-8 border-t-4 border-l-4 border-secondary rounded-tl-lg"></div>
<div class="absolute -top-2 -right-2 w-8 h-8 border-t-4 border-r-4 border-secondary rounded-tr-lg"></div>
<div class="absolute -bottom-2 -left-2 w-8 h-8 border-b-4 border-l-4 border-secondary rounded-bl-lg"></div>
<div class="absolute -bottom-2 -right-2 w-8 h-8 border-b-4 border-r-4 border-secondary rounded-br-lg"></div>
<!-- Scanning Indicators -->
<div class="absolute -right-16 top-0 hidden lg:flex flex-col gap-4 text-secondary/60">
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold tracking-widest uppercase font-headline">Sync_Mode</span>
<span class="text-xs font-mono">CV_ACTIVE</span>
</div>
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold tracking-widest uppercase font-headline">Resolution</span>
<span class="text-xs font-mono">4K_OPTIMIZED</span>
</div>
</div>
</div>
<!-- Guidance Text -->
<div class="relative z-20 mt-12 text-center px-6">
<div class="inline-flex items-center gap-2 bg-surface-container-high/40 border border-outline-variant/15 backdrop-blur-md px-4 py-2 rounded-full mb-4">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-sm font-medium tracking-wide text-on-surface-variant uppercase">Aponte para o nome da carta</p>
</div>
<p class="text-on-surface/60 text-xs font-label">Mantenha a câmera estável para melhor precisão</p>
</div>
<!-- Interaction Layer -->
<div class="relative z-20 w-full max-w-md px-8 mt-16 flex flex-col gap-4">
<button class="w-full h-16 bg-gradient-to-br from-[#c6bfff] to-[#6c5ce7] rounded-full flex items-center justify-center gap-3 shadow-[0_10px_30px_rgba(108,92,231,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-white text-2xl" data-icon="center_focus_strong" style="font-variation-settings: 'FILL' 1;">center_focus_strong</span>
<span class="text-white font-headline font-extrabold text-lg uppercase tracking-wider">Capturar</span>
</button>
<button class="w-full h-12 bg-surface-container-high/50 border border-outline-variant/15 backdrop-blur-md rounded-full flex items-center justify-center gap-2 text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-xl" data-icon="arrow_back">arrow_back</span>
<span class="font-label font-semibold text-sm uppercase tracking-widest">Voltar</span>
</button>
</div>
</main>
<!-- BottomNavBar Predicted Component (Active: Scanner) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end pb-6 px-4 bg-[#0e0e11]/90 backdrop-blur-md shadow-[0_-10px_30px_rgba(0,0,0,0.5)] rounded-t-[0.75rem]">
<!-- Archive Tab -->
<div class="flex flex-col items-center justify-center text-[#474554] px-4 py-2 hover:text-[#00cec9] cursor-pointer transition-colors group">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-tighter">Archive</span>
</div>
<!-- Scanner Tab (Active) -->
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#c6bfff] to-[#6c5ce7] text-white rounded-[0.75rem] px-5 py-2 scale-110 -translate-y-2 transition-all cursor-pointer shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined mb-1" data-icon="center_focus_strong" style="font-variation-settings: 'FILL' 1;">center_focus_strong</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-tighter">Scanner</span>
</div>
<!-- Market Tab -->
<div class="flex flex-col items-center justify-center text-[#474554] px-4 py-2 hover:text-[#00cec9] cursor-pointer transition-colors group">
<span class="material-symbols-outlined mb-1" data-icon="payments">payments</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-tighter">Market</span>
</div>
</nav>
<!-- Decorative Tech Elements -->
<div class="fixed bottom-32 left-8 z-20 pointer-events-none opacity-20 hidden md:block">
<div class="w-32 h-32 border-l border-b border-secondary/40"></div>
<span class="absolute bottom-2 left-2 text-[8px] font-mono text-secondary tracking-widest">NAV_STABLE_V2.0</span>
</div>
<div class="fixed top-32 right-8 z-20 pointer-events-none opacity-20 hidden md:block">
<div class="w-32 h-32 border-r border-t border-secondary/40"></div>
<span class="absolute top-2 right-2 text-[8px] font-mono text-secondary tracking-widest">CAM_EXT_049</span>
</div>
</div>
</body></html>
