name: 🤖 MTG Daily Pinecone Miner

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: 

jobs:
  mine-cards:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js (Motor V8)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Inteligência Pinecone Database
        run: npm install

      - name: Rodar Minerador Autônomo
        env:
          # Senha segura oculta no Cofre do Banco de Dados
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: node miner.mjs
