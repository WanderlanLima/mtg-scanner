name: 🤖 MTG Daily Vector Miner

on:
  schedule:
    # Roda todos os dias às 03:00 da manhã UTC (Meia Noite horário do Brasil)
    - cron: '0 3 * * *'
  # Permite que você acione o robô manualmente no GitHub (Actions > Run Workflow)
  workflow_dispatch: 

jobs:
  mine-cards:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Motor V8 (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências Base (Supabase e Transformers.js)
        run: npm install

      - name: Iniciar Extração Vetorial
        env:
          # Injeta a senha suprema trancada no Cofre de Segurança do Github de forma invisível
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node miner.mjs
